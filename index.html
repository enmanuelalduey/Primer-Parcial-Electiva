<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Parcial - Enmanuel</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', sans-serif; background: #0a0a0a; color: #fff; min-height: 100vh; display: flex; justify-content: center; align-items: center; }
    .card { background: #141414; border: 1px solid #2a2a2a; border-radius: 16px; padding: 48px 56px; text-align: center; max-width: 520px; width: 90%; box-shadow: 0 0 40px rgba(124,58,237,0.15); }
    .badge { display: inline-block; background: #1e1030; color: #a78bfa; font-size: 12px; font-weight: 600; letter-spacing: 1.5px; text-transform: uppercase; padding: 6px 16px; border-radius: 999px; border: 1px solid #4c1d95; margin-bottom: 24px; }
    h1 { font-size: 2rem; font-weight: 700; margin-bottom: 12px; }
    h1 span { color: #7c3aed; }
    p { color: #888; font-size: 0.95rem; line-height: 1.6; margin-bottom: 32px; }
    .tags { display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; }
    .tag { background: #1a1a1a; border: 1px solid #2a2a2a; color: #ccc; font-size: 13px; padding: 6px 14px; border-radius: 8px; }
    .tag.purple { border-color: #4c1d95; color: #a78bfa; }
    .footer { margin-top: 36px; font-size: 12px; color: #444; }
    .footer span { color: #7c3aed; }
  </style>
</head>
<body>
  <div class="card">
    <div class="badge">CI/CD activo</div>
    <h1>Hola, soy <span>Enmanuel</span></h1>
    <p>Este sitio se despliega automáticamente a Surge.sh cada vez que hago push a GitHub usando GitHub Actions.</p>
    <div class="tags">
      <span class="tag purple">GitHub Actions</span>
      <span class="tag purple">Surge.sh</span>
      <span class="tag">HTML</span>
      <span class="tag">CSS</span>
      <span class="tag">CI/CD</span>
    </div>
    <div class="footer">1er Parcial · ITLA · <span>2026</span></div>
  </div>
</body>
</html>
